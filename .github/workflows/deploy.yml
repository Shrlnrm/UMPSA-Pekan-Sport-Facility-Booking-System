name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate secrets are set
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "ERROR: SUPABASE_URL or SUPABASE_ANON_KEY secret is not set!"
            echo "Go to Settings > Secrets and variables > Actions and add both secrets."
            exit 1
          fi
          echo "Secrets are set. Proceeding with deployment..."

      - name: Inject secrets into supabaseClient.js
        run: |
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" js/supabaseClient.js
          sed -i "s|__SUPABASE_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" js/supabaseClient.js
          echo "Secrets injected successfully."

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github'
